    <line x1="425" y1="524" x2="425" y2="580" stroke="#F4ECDA" stroke-width="1" opacity="0.25"/>
    <line x1="775" y1="524" x2="775" y2="580" stroke="#F4ECDA" stroke-width="1" opacity="0.25"/>

